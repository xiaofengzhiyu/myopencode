name: Build OpenCode

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "选择要构建的分支"
        required: true
        type: choice
        options:
          - dev
          - beta
          - main
      version:
        description: "版本号覆盖（留空使用自动版本）"
        required: false
        type: string

      # ── CLI 平台选择 ──
      cli_windows:
        description: "CLI: Windows (x64 + ARM64)"
        type: boolean
        default: false
      cli_macos:
        description: "CLI: macOS (Intel + ARM)"
        type: boolean
        default: false
      cli_linux:
        description: "CLI: Linux (x64 + ARM64, glibc + musl)"
        type: boolean
        default: false

      # ── Desktop 平台选择 ──
      desktop_windows:
        description: "Desktop: Windows x64"
        type: boolean
        default: false
      desktop_macos_intel:
        description: "Desktop: macOS Intel (x64)"
        type: boolean
        default: false
      desktop_macos_arm:
        description: "Desktop: macOS Apple Silicon (ARM64)"
        type: boolean
        default: false
      desktop_linux:
        description: "Desktop: Linux x64"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────
  # CLI 构建（单 runner 交叉编译，按平台过滤上传）
  # ────────────────────────────────────────────
  build-cli:
    runs-on: ubuntu-latest
    if: inputs.cli_windows || inputs.cli_macos || inputs.cli_linux
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - name: Build CLI
        run: ./packages/opencode/script/build.ts
        env:
          OPENCODE_VERSION: ${{ inputs.version || '0.0.0-build' }}

      - name: Package artifacts
        working-directory: packages/opencode/dist
        run: |
          UPLOAD_DIR="$RUNNER_TEMP/upload"
          mkdir -p "$UPLOAD_DIR"

          for dir in opencode-*/; do
            name="${dir%/}"

            # 按用户勾选的平台过滤
            case "$name" in
              *windows*)  [ "${{ inputs.cli_windows }}" != "true" ] && continue ;;
              *darwin*)   [ "${{ inputs.cli_macos }}"   != "true" ] && continue ;;
              *linux*)    [ "${{ inputs.cli_linux }}"    != "true" ] && continue ;;
            esac

            echo "Packaging: $name"
            if [[ "$name" == *linux* ]]; then
              tar -czf "$UPLOAD_DIR/${name}.tar.gz" -C "$name" bin
            else
              cd "$name/bin"
              zip -r "$UPLOAD_DIR/${name}.zip" ./*
              cd "$GITHUB_WORKSPACE/packages/opencode/dist"
            fi
          done

          echo "Files to upload:"
          ls -lh "$UPLOAD_DIR/"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: opencode-cli
          path: ${{ runner.temp }}/upload/*
          retention-days: 7

  # ────────────────────────────────────────────
  # Desktop: Windows x64
  # ────────────────────────────────────────────
  desktop-windows:
    runs-on: windows-latest
    if: inputs.desktop_windows
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          ref: ${{ inputs.branch }}

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"

      - name: Build CLI (single)
        run: ./packages/opencode/script/build.ts --single
        env:
          OPENCODE_VERSION: ${{ inputs.version || '0.0.0-build' }}

      - name: Prepare desktop
        run: bun ./scripts/prepare.ts
        working-directory: packages/desktop
        env:
          OPENCODE_VERSION: ${{ inputs.version || '0.0.0-build' }}
          OPENCODE_CHANNEL: prod
          OPENCODE_CLI_ARTIFACT: opencode-cli-windows
          RUST_TARGET: x86_64-pc-windows-msvc
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Build & package
        run: npx electron-builder --win --config electron-builder.config.ts --publish never
        working-directory: packages/desktop
        timeout-minutes: 30
        env:
          OPENCODE_CHANNEL: prod

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: opencode-desktop-windows-x64
          path: packages/desktop/dist/*
          retention-days: 7

  # ────────────────────────────────────────────
  # Desktop: macOS Intel
  # ────────────────────────────────────────────
  desktop-macos-intel:
    runs-on: macos-13
    if: inputs.desktop_macos_intel
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          ref: ${{ inputs.branch }}

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"

      - name: Build CLI (single)
        run: ./packages/opencode/script/build.ts --single
        env:
          OPENCODE_VERSION: ${{ inputs.version || '0.0.0-build' }}

      - name: Prepare desktop
        run: bun ./scripts/prepare.ts
        working-directory: packages/desktop
        env:
          OPENCODE_VERSION: ${{ inputs.version || '0.0.0-build' }}
          OPENCODE_CHANNEL: prod
          OPENCODE_CLI_ARTIFACT: opencode-cli
          RUST_TARGET: x86_64-apple-darwin
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Build & package
        run: npx electron-builder --mac --x64 --config electron-builder.config.ts --publish never
        working-directory: packages/desktop
        timeout-minutes: 30
        env:
          OPENCODE_CHANNEL: prod

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: opencode-desktop-macos-x64
          path: packages/desktop/dist/*
          retention-days: 7

  # ────────────────────────────────────────────
  # Desktop: macOS Apple Silicon
  # ────────────────────────────────────────────
  desktop-macos-arm:
    runs-on: macos-latest
    if: inputs.desktop_macos_arm
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          ref: ${{ inputs.branch }}

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"

      - name: Build CLI (single)
        run: ./packages/opencode/script/build.ts --single
        env:
          OPENCODE_VERSION: ${{ inputs.version || '0.0.0-build' }}

      - name: Prepare desktop
        run: bun ./scripts/prepare.ts
        working-directory: packages/desktop
        env:
          OPENCODE_VERSION: ${{ inputs.version || '0.0.0-build' }}
          OPENCODE_CHANNEL: prod
          OPENCODE_CLI_ARTIFACT: opencode-cli
          RUST_TARGET: aarch64-apple-darwin
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Build & package
        run: npx electron-builder --mac --arm64 --config electron-builder.config.ts --publish never
        working-directory: packages/desktop
        timeout-minutes: 30
        env:
          OPENCODE_CHANNEL: prod

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: opencode-desktop-macos-arm64
          path: packages/desktop/dist/*
          retention-days: 7

  # ────────────────────────────────────────────
  # Desktop: Linux x64
  # ────────────────────────────────────────────
  desktop-linux:
    runs-on: ubuntu-latest
    if: inputs.desktop_linux
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          ref: ${{ inputs.branch }}

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build CLI (single)
        run: ./packages/opencode/script/build.ts --single
        env:
          OPENCODE_VERSION: ${{ inputs.version || '0.0.0-build' }}

      - name: Prepare desktop
        run: bun ./scripts/prepare.ts
        working-directory: packages/desktop
        env:
          OPENCODE_VERSION: ${{ inputs.version || '0.0.0-build' }}
          OPENCODE_CHANNEL: prod
          OPENCODE_CLI_ARTIFACT: opencode-cli
          RUST_TARGET: x86_64-unknown-linux-gnu
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Build & package
        run: npx electron-builder --linux --config electron-builder.config.ts --publish never
        working-directory: packages/desktop
        timeout-minutes: 30
        env:
          OPENCODE_CHANNEL: prod

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: opencode-desktop-linux-x64
          path: packages/desktop/dist/*
          retention-days: 7
